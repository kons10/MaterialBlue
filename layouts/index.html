{{ define "main" }}
<script type="module">
  import { createBskyClient } from '/src/bsky-client.js';

  const client = createBskyClient();

  // ✅ セッション復元を待ってからリダイレクト
  (async () => {
    await client.waitForSessionRestore();
    const mainUrl = {{ "main/" | relURL | jsonify }};
    const loginUrl = {{ "login/" | relURL | jsonify }};
    const target = client.isLoggedIn ? mainUrl : loginUrl;
    if (window.location.pathname !== new URL(target, window.location.origin).pathname) {
      window.location.replace(target);
    }
  })();
</script>

<div style="text-align:center; padding:48px;">
  <md-circular-progress indeterminate></md-circular-progress>
  <p style="margin-top:16px;" class="md-typescale-body-large">読み込み中...</p>
</div>
{{ end }}
