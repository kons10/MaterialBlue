{{ define "main" }}

<!-- エラーメッセージ表示エリア -->
<div id="errorMessage" style="display:none; padding:12px 16px; margin:16px 0; background:var(--md-sys-color-error-container, #ffebee); color:var(--md-sys-color-on-error-container, #c62828); border-radius:8px;" class="md-typescale-body-medium"></div>

<!-- ログインカード -->
<md-elevated-card style="padding:16px; margin:16px 0;">
  <div slot="headline" class="md-typescale-title-large">ログイン</div>
  <div slot="supporting-text" class="md-typescale-body-medium">Bluesky のアカウントでログインしてください</div>
  
  <div style="display:flex; flex-direction:column; gap:12px; margin-top:12px;">
    <md-outlined-text-field id="id" label="ハンドル (例：user.bsky.social)" fullwidth type="text">
      <md-icon slot="leading-icon">person</md-icon>
    </md-outlined-text-field>
    
    <md-outlined-text-field id="pw" label="アプリパスワード" type="password" fullwidth>
      <md-icon slot="leading-icon">lock</md-icon>
    </md-outlined-text-field>
    
    <md-filled-button id="loginBtn" style="width:100%; justify-content:center;">
      <md-icon slot="icon">login</md-icon>
      ログイン
    </md-filled-button>
  </div>
</md-elevated-card>

<!-- タイムライン表示エリア -->
<md-elevated-card id="timeline-card" style="padding:16px; display:none;" hidden>
  <div slot="headline" class="md-typescale-title-large" style="display:flex; align-items:center; gap:8px;">
    <md-icon>rss_feed</md-icon>
    タイムライン
  </div>
  
  <!-- 投稿エリア -->
  <div style="margin-top:16px;">
    <md-outlined-text-field id="postText" label="新しい投稿" fullwidth style="min-height:100px;">
      <md-icon slot="leading-icon">edit_note</md-icon>
      <textarea slot="textarea" style="width:100%; min-height:80px; resize:vertical; font-family:inherit; font-size:inherit;"></textarea>
    </md-outlined-text-field>
    
    <!-- 画像添付エリア -->
    <div style="display:flex; align-items:center; gap:8px; margin-top:12px;">
      <md-filled-tonal-button id="imageUploadBtn">
        <md-icon slot="icon">image</md-icon>
        画像を追加
      </md-filled-tonal-button>
      <input type="file" id="imageInput" accept="image/*" multiple style="display:none;">
      <span id="imageCount" style="font-size:14px; color:var(--md-sys-color-on-surface-variant);"></span>
    </div>
    <div id="imagePreview" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:12px;"></div>
    
    <md-filled-button id="postBtn" style="width:100%; justify-content:center; margin-top:12px;">
      <md-icon slot="icon">send</md-icon>
      投稿
    </md-filled-button>
  </div>
  
  <!-- タイムライン更新・ログアウトボタン -->
  <div style="display:flex; justify-content:space-between; align-items:center; margin-top:16px; padding-top:16px; border-top:1px solid var(--md-sys-color-outline);">
    <md-filled-tonal-button id="refreshBtn">
      <md-icon slot="icon">refresh</md-icon>
      更新
    </md-filled-tonal-button>
    <md-outlined-button id="logoutBtn">
      <md-icon slot="icon">logout</md-icon>
      ログアウト
    </md-outlined-button>
  </div>
  
  <!-- タイムラインリスト -->
  <md-list id="timeline" style="margin-top:16px; border-top:1px solid var(--md-sys-color-outline);"></md-list>
</md-elevated-card>

<!-- ローディング表示 -->
<md-circular-progress id="loading" indeterminate style="display:none; margin:24px auto;"></md-circular-progress>

<script type="module">
  // static/src/bsky-client.js を読み込み（Hugo は static/ 以下をルートとして配信するよ）
  import { createBskyClient } from '/src/bsky-client.js';

  const client = createBskyClient();
  const loginBtn = document.getElementById('loginBtn');
  const timelineCard = document.getElementById('timeline-card');
  const refreshBtn = document.getElementById('refreshBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const postBtn = document.getElementById('postBtn');
  const imageUploadBtn = document.getElementById('imageUploadBtn');
  const imageInput = document.getElementById('imageInput');
  const imageCount = document.getElementById('imageCount');
  const imagePreview = document.getElementById('imagePreview');
  const loading = document.getElementById('loading');
  const errorMessage = document.getElementById('errorMessage');
  
  // 選択された画像を保持する配列
  let selectedImages = [];

  // エラーメッセージ表示関数
  function showError(message) {
    errorMessage.textContent = message;
    errorMessage.style.display = 'block';
    setTimeout(() => {
      errorMessage.style.display = 'none';
    }, 5000);
  }

  // 自動ログイン済みの場合
  if (client.isLoggedIn) {
    showTimeline();
  }

  loginBtn.addEventListener('click', async () => {
    const id = document.getElementById('id').value.trim();
    const pw = document.getElementById('pw').value.trim();
    
    if (!id || !pw) {
      showError('ハンドルとアプリパスワードを入力してください');
      return;
    }
    
    loginBtn.disabled = true;
    showLoading(true);
    
    try {
      await client.login(id, pw);
      showTimeline();
    } catch (e) {
      showError(`ログインエラー：${e.message}`);
    } finally {
      loginBtn.disabled = false;
      showLoading(false);
    }
  });

  refreshBtn.addEventListener('click', async () => {
    refreshBtn.disabled = true;
    await loadTimeline();
    refreshBtn.disabled = false;
  });

  logoutBtn.addEventListener('click', async () => {
    await client.logout();
    location.reload();
  });

  postBtn.addEventListener('click', async () => {
    const postTextField = document.getElementById('postText');
    // Material Web Components の text field から値を取得
    // shadow DOM 内の textarea または input から値を取得する必要がある場合がある
    let text = '';
    if (postTextField.value) {
      text = postTextField.value.trim();
    } else {
      // shadow DOM 内の textarea から直接取得
      const textarea = postTextField.querySelector('textarea') || 
                       postTextField.shadowRoot?.querySelector('textarea') ||
                       postTextField.shadowRoot?.querySelector('input');
      text = textarea ? textarea.value.trim() : '';
    }
    
    if (!text && selectedImages.length === 0) {
      showError('投稿内容または画像を入力してください');
      return;
    }
    
    postBtn.disabled = true;
    postBtn.textContent = '投稿中...';
    
    try {
      console.log('投稿開始:', { text, imageCount: selectedImages.length });
      console.log('client メソッド確認:', typeof client.post, typeof client.postWithImage);
      
      if (selectedImages.length > 0) {
        // 画像付き投稿
        console.log('画像付き投稿を実行');
        await client.postWithImage(text, selectedImages);
        selectedImages = [];
        updateImagePreview();
      } else {
        // テキストのみ投稿
        console.log('テキスト投稿を実行');
        await client.post(text);
      }
      if (postTextField.value) {
        postTextField.value = '';
      } else {
        const textarea = postTextField.querySelector('textarea') || 
                         postTextField.shadowRoot?.querySelector('textarea');
        if (textarea) textarea.value = '';
      }
      showError('投稿しました！');
      errorMessage.style.background = 'var(--md-sys-color-primary-container, #bbdefb)';
      errorMessage.style.color = 'var(--md-sys-color-on-primary-container, #0d47a1)';
      setTimeout(() => {
        errorMessage.style.background = '';
        errorMessage.style.color = '';
      }, 3000);
      await loadTimeline();
    } catch (e) {
      console.error('投稿エラー詳細:', e);
      showError(`投稿エラー：${e.message}`);
    } finally {
      postBtn.disabled = false;
      postBtn.innerHTML = '<md-icon slot="icon">send</md-icon>投稿';
    }
  });

  // 画像アップロードボタンクリック
  imageUploadBtn.addEventListener('click', () => {
    imageInput.click();
  });

  // 画像選択時の処理
  imageInput.addEventListener('change', (e) => {
    const files = Array.from(e.target.files);
    if (files.length === 0) return;
    
    // 最大 4 枚まで（Bluesky の制限）
    const remainingSlots = 4 - selectedImages.length;
    const filesToAdd = files.slice(0, remainingSlots);
    
    if (files.length > remainingSlots) {
      showError(`画像は最大 4 枚まで添付できます。残り${remainingSlots}枚です。`);
    }
    
    filesToAdd.forEach(file => {
      selectedImages.push(file);
    });
    
    updateImagePreview();
    imageInput.value = ''; // 同じファイルを再度選択できるようにリセット
  });

  // 画像プレビュー更新関数
  function updateImagePreview() {
    imagePreview.innerHTML = '';
    imageCount.textContent = selectedImages.length > 0 ? `${selectedImages.length}枚選択中` : '';
    
    selectedImages.forEach((file, index) => {
      const container = document.createElement('div');
      container.style.position = 'relative';
      
      const img = document.createElement('img');
      img.src = URL.createObjectURL(file);
      img.style.width = '80px';
      img.style.height = '80px';
      img.style.objectFit = 'cover';
      img.style.borderRadius = '8px';
      
      // 削除ボタン
      const removeBtn = document.createElement('md-icon-button');
      removeBtn.textContent = 'close';
      removeBtn.style.position = 'absolute';
      removeBtn.style.top = '-8px';
      removeBtn.style.right = '-8px';
      removeBtn.style.backgroundColor = 'var(--md-sys-color-error)';
      removeBtn.style.color = 'white';
      removeBtn.style.borderRadius = '50%';
      removeBtn.style.width = '24px';
      removeBtn.style.height = '24px';
      removeBtn.style.fontSize = '16px';
      
      removeBtn.addEventListener('click', () => {
        selectedImages.splice(index, 1);
        updateImagePreview();
      });
      
      container.appendChild(img);
      container.appendChild(removeBtn);
      imagePreview.appendChild(container);
    });
  }

  function showLoading(show) {
    loading.style.display = show ? 'block' : 'none';
  }

  function showTimeline() {
    document.querySelector('md-elevated-card:not(#timeline-card)').style.display = 'none';
    timelineCard.hidden = false;
    timelineCard.style.display = 'block';
    loadTimeline();
  }

  async function loadTimeline() {
    try {
      const feed = await client.timeline(20);
      const container = document.getElementById('timeline');
      
      // リストアイテムを生成
      container.innerHTML = '';
      feed.forEach(item => {
        const post = item.post;
        const record = post.record;
        
        // メインのリストアイテム作成
        const listItem = document.createElement('md-list-item');
        listItem.type = 'link';
        
        // アイコンスロット
        const avatarIcon = document.createElement('md-icon');
        avatarIcon.slot = 'start';
        avatarIcon.textContent = 'account_circle';
        
        // ヘッドライン
        const headline = document.createElement('div');
        headline.slot = 'headline';
        headline.textContent = `@${post.author.handle}`;
        headline.className = 'md-typescale-body-large';
        
        // サポーティングテキスト
        const supporting = document.createElement('div');
        supporting.slot = 'supporting-text';
        supporting.textContent = record.text;
        supporting.className = 'md-typescale-body-medium';
        
        listItem.appendChild(avatarIcon);
        listItem.appendChild(headline);
        listItem.appendChild(supporting);
        container.appendChild(listItem);
        
        // 画像がある場合は表示
        // NOTE: Bluesky の TL では画像情報が `post.embed.images` に入る。
        // 投稿レコード側 (`record.embed.images`) を見ると取得できないことがあるため両方を確認する。
        const images = post.embed?.images || record.embed?.images || [];
        if (images.length > 0) {
          const imageContainer = document.createElement('div');
          imageContainer.style.display = 'flex';
          imageContainer.style.gap = '8px';
          imageContainer.style.flexWrap = 'wrap';
          imageContainer.style.margin = '8px 16px';
          
          images.forEach(img => {
            const imgElement = document.createElement('img');
            imgElement.src = img.fullsize || img.thumbnail;
            imgElement.style.width = '120px';
            imgElement.style.height = '120px';
            imgElement.style.objectFit = 'cover';
            imgElement.style.borderRadius = '8px';
            imgElement.style.cursor = 'pointer';
            
            // クリックで拡大表示（シンプル実装）
            imgElement.addEventListener('click', () => {
              window.open(img.fullsize || img.thumbnail, '_blank');
            });
            
            imageContainer.appendChild(imgElement);
          });
          
          container.appendChild(imageContainer);
        }
        
        // 区切り線
        const divider = document.createElement('md-divider');
        container.appendChild(divider);
      });
    } catch (e) {
      console.error('Timeline load error:', e);
      showError('タイムラインの取得に失敗しました');
    }
  }

  // エンターキーで投稿（Ctrl+Enter または Cmd+Enter）
  const postTextarea = document.querySelector('#postText textarea[slot="textarea"]');
  if (postTextarea) {
    postTextarea.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        if (!postBtn.disabled) {
          postBtn.click();
        }
      }
    });
  }
</script>
{{ end }}
