{{ define "main" }}

<md-card style="padding:16px; margin:16px 0; --md-elevation-level: 1;">
  <div style="display:flex; flex-direction:column; gap:12px;">
    <md-outlined-text-field id="id" label="ハンドル (例: user.bsky.social)" fullwidth></md-outlined-text-field>
    <md-outlined-text-field id="pw" label="アプリパスワード" type="password" fullwidth></md-outlined-text-field>
    <md-filled-button id="loginBtn" style="align-self:flex-end;">ログイン</md-filled-button>
  </div>
</md-card>

<!-- タイムライン表示エリア -->
<md-card id="timeline-card" style="padding:16px; display:none;" hidden>
  <div id="timeline" style="display:flex; flex-direction:column; gap:8px;"></div>
</md-card>

<script type="module">
  // static/src/bsky-client.js を読み込み（Hugo は static/ 以下をルートとして配信するよ）
  import { createBskyClient } from '/src/bsky-client.js';

  const client = createBskyClient();
  const loginBtn = document.getElementById('loginBtn');
  const timelineCard = document.getElementById('timeline-card');

  // 自動ログイン済みの場合
  if (client.isLoggedIn) {
    showTimeline();
  }

  loginBtn.addEventListener('click', async () => {
    const id = document.getElementById('id').value.trim();
    const pw = document.getElementById('pw').value.trim();
    
    loginBtn.disabled = true;
    loginBtn.textContent = 'ログイン中...';
    
    try {
      await client.login(id, pw);
      showTimeline();
    } catch (e) {
      alert(`エラー: ${e.message}`);
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'ログイン';
    }
  });

  function showTimeline() {
    document.querySelector('md-card[style*="padding:16px; margin:16px 0"]').style.display = 'none';
    timelineCard.hidden = false;
    timelineCard.style.display = 'block';
    loadTimeline();
  }

  async function loadTimeline() {
    try {
      const feed = await client.timeline(20);
      const container = document.getElementById('timeline');
      container.innerHTML = feed.map(item => {
        const post = item.post;
        return `
          <md-card style="padding:12px; --md-elevation-level: 0; border:1px solid #eee;">
            <div style="font-weight:500; margin-bottom:4px;">@${post.author.handle}</div>
            <div style="white-space:pre-wrap; line-height:1.4;">${post.record.text}</div>
          </md-card>
        `;
      }).join('');
    } catch (e) {
      console.error('Timeline load error:', e);
    }
  }
</script>
{{ end }}
