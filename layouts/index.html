{{ define "main" }}
<!-- ✅ 使うコンポーネントだけを個別にインポート（all.js 読み込み後でも個別指定が必要） -->
<script type="module">
  import '@material/web/button/filled-button.js';
  import '@material/web/textfield/outlined-text-field.js';
  import '@material/web/card/card.js';
</script>

<md-card style="padding:16px; margin:16px 0;">
  <!-- ✅ MWC のコンポーネントはカスタム要素としてそのまま使える -->
  <md-outlined-text-field id="id" label="ハンドル"></md-outlined-text-field>
  <md-outlined-text-field id="pw" label="アプリパスワード" type="password"></md-outlined-text-field>
  <md-filled-button id="loginBtn" style="margin-top:8px;">ログイン</md-filled-button>
</md-card>

<div id="timeline"></div>

<script type="module">
  import { createBskyClient } from '/src/bsky-client.js';
  // ↑ 上記で import 済みのコンポーネントは再インポート不要

  const client = createBskyClient();
  if (client.isLoggedIn) loadTimeline();

  document.getElementById('loginBtn').addEventListener('click', async () => {
    const id = document.getElementById('id').value.trim();
    const pw = document.getElementById('pw').value.trim();
    try {
      await client.login(id, pw);
      loadTimeline();
    } catch (e) { alert(`エラー: ${e.message}`); }
  });

  async function loadTimeline() {
    const feed = await client.timeline();
    document.getElementById('timeline').innerHTML = feed.map(p => 
      `<p><b>@${p.post.author.handle}</b>: ${p.post.record.text}</p><hr>`
    ).join('');
  }
</script>
{{ end }}
