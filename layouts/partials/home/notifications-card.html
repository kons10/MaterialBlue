<md-elevated-card id="notifications-card" style="padding:16px; display:none;" hidden>
  <div slot="headline" class="md-typescale-title-large" style="display:flex; align-items:center; gap:8px;">
    <md-icon>notifications</md-icon>
    通知
  </div>

  <div style="display:flex; justify-content:flex-start; align-items:center; gap:8px; margin-top:16px; padding-top:16px; border-top:1px solid var(--md-sys-color-outline); flex-wrap:wrap;">
    <md-filled-tonal-button id="notificationsRefreshBtn">
      <md-icon slot="icon">refresh</md-icon>
      更新
    </md-filled-tonal-button>
    <md-outlined-button id="notificationsSeenBtn">
      <md-icon slot="icon">done_all</md-icon>
      既読にする
    </md-outlined-button>
  </div>

  <md-list id="notifications" style="margin-top:16px; border-top:1px solid var(--md-sys-color-outline);"></md-list>
</md-elevated-card>
