<md-elevated-card id="timeline-card" style="padding:16px; display:none;" hidden>
  <div slot="headline" class="md-typescale-title-large" style="display:flex; align-items:center; gap:8px;">
    <span class="material-symbols-outlined">rss_feed</span>
    タイムライン
  </div>

  <div id="composer" style="margin-top:16px;">
    <md-outlined-text-field id="postText" label="新しい投稿" fullwidth style="min-height:100px;">
      <span class="material-symbols-outlined" slot="leading-icon">edit_note</span>
      <textarea slot="textarea" style="width:100%; min-height:80px; resize:vertical; font-family:inherit; font-size:inherit;"></textarea>
    </md-outlined-text-field>

    <div style="display:flex; align-items:center; gap:8px; margin-top:12px;">
      <md-filled-tonal-button id="imageUploadBtn">
        <span class="material-symbols-outlined" slot="icon">image</span>
        画像を追加
      </md-filled-tonal-button>
      <input type="file" id="imageInput" accept="image/*" multiple style="display:none;">
      <span id="imageCount" style="font-size:14px; color:var(--md-sys-color-on-surface-variant);"></span>
    </div>
    <div id="imagePreview" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:12px;"></div>

    <md-filled-button id="postBtn" style="width:100%; justify-content:center; margin-top:12px;">
      <span class="material-symbols-outlined" slot="icon">send</span>
      投稿
    </md-filled-button>
  </div>

  <div style="display:flex; justify-content:flex-start; align-items:center; margin-top:16px; padding-top:16px; border-top:1px solid var(--md-sys-color-outline);">
    <md-filled-tonal-button id="refreshBtn">
      <span class="material-symbols-outlined" slot="icon">refresh</span>
      更新
    </md-filled-tonal-button>
  </div>

  <md-list id="timeline" style="margin-top:16px; border-top:1px solid var(--md-sys-color-outline);"></md-list>

  <div id="timelineBottom" style="display:none; justify-content:center; margin-top:16px;">
    <md-filled-tonal-button id="seeMoreBtn">
      <span class="material-symbols-outlined" slot="icon">expand_more</span>
      See more
    </md-filled-tonal-button>
  </div>
</md-elevated-card>
