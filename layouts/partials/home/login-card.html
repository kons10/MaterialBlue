<md-elevated-card id="login" style="padding:16px; margin:16px 0; display:none;" hidden>
  <div slot="headline" class="md-typescale-title-large">ログイン</div>
  <div slot="supporting-text" class="md-typescale-body-medium">Bluesky のアカウントでログインしてください</div>
  
  <div style="display:flex; flex-direction:column; gap:12px; margin-top:12px;">
    <md-outlined-text-field id="id" label="ハンドル (例：user.bsky.social)" fullwidth type="text">
      <span class="material-symbols-outlined" slot="leading-icon">person</span>
    </md-outlined-text-field>
    
    <md-outlined-text-field id="pw" label="アプリパスワード" type="password" fullwidth>
      <span class="material-symbols-outlined" slot="leading-icon">lock</span>
    </md-outlined-text-field>
    
    <md-filled-button id="loginBtn" style="width:100%; justify-content:center;">
      <span class="material-symbols-outlined" slot="icon">login</span>
      ログイン
    </md-filled-button>
  </div>
</md-elevated-card>
