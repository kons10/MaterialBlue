{{ define "main" }}

<!-- ログインカード -->
<md-elevated-card style="padding:16px; margin:16px 0;">
  <div slot="headline" class="md-typescale-title-large">ログイン</div>
  <div slot="supporting-text" class="md-typescale-body-medium">Bluesky のアカウントでログインしてください</div>
  
  <div style="display:flex; flex-direction:column; gap:12px; margin-top:12px;">
    <md-outlined-text-field id="id" label="ハンドル (例：user.bsky.social)" fullwidth type="text">
      <md-icon slot="leading-icon">person</md-icon>
    </md-outlined-text-field>
    
    <md-outlined-text-field id="pw" label="アプリパスワード" type="password" fullwidth>
      <md-icon slot="leading-icon">lock</md-icon>
    </md-outlined-text-field>
    
    <md-filled-button id="loginBtn" style="align-self:flex-end;">
      <md-icon slot="icon">login</md-icon>
      ログイン
    </md-filled-button>
  </div>
</md-elevated-card>

<!-- ローディング表示 -->
<md-circular-progress id="loading" indeterminate style="display:none; margin:24px auto;"></md-circular-progress>

<script type="module">
  // static/src/bsky-client.js を読み込み
  import { createBskyClient } from '/src/bsky-client.js';

  const client = createBskyClient();
  const loginBtn = document.getElementById('loginBtn');
  const loading = document.getElementById('loading');
  
  // ログイン済みの場合、メイン画面にリダイレクト
  // ただし、セッション復元中は待機してから判断
  if (client.isLoggedIn) {
    window.location.href = '/home';
  } else if (client.isRestoringSession) {
    // セッション復元中の場合は、復元完了を待ってから再判定
    client.waitForSessionRestore().then(() => {
      if (client.isLoggedIn) {
        window.location.href = '/home';
      }
    });
  }

  loginBtn.addEventListener('click', async () => {
    const id = document.getElementById('id').value.trim();
    const pw = document.getElementById('pw').value.trim();
    
    if (!id || !pw) {
      alert('ハンドルとアプリパスワードを入力してください');
      return;
    }
    
    loginBtn.disabled = true;
    showLoading(true);
    
    try {
      await client.login(id, pw);
      // ログイン成功後、メイン画面へ遷移
      window.location.href = '/home';
    } catch (e) {
      alert(`エラー：${e.message}`);
    } finally {
      loginBtn.disabled = false;
      showLoading(false);
    }
  });

  function showLoading(show) {
    loading.style.display = show ? 'block' : 'none';
  }
</script>
{{ end }}
