<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title | default "Static Bluesky Client" }}</title>
  <link rel="stylesheet" href="https://esm.run/@material/web/all.css">
  <script type="importmap">
  {
    "imports": {
      "@material/web/button/": "https://esm.run/@material/web/button/",
      "@material/web/textfield/": "https://esm.run/@material/web/textfield/",
      "@material/web/card/": "https://esm.run/@material/web/card/"
    }
  }
  </script>
</head>
<body>
  <header style="padding:12px 16px; background:#f8f9fa; border-bottom:1px solid #e0e0e0;">
    <h1 style="margin:0; font-size:1.25rem;">🐦 Static Bluesky</h1>
  </header>

  <main style="max-width:640px; margin:0 auto; padding:0 16px;">
    {{ block "main" . }}{{ end }}
  </main>

  <footer style="padding:16px; text-align:center; color:#888; font-size:0.85rem; margin-top:32px;">
    <p>© 2026 {{ .Site.Title }} | Built with Hugo & MWC</p>
  </footer>
</body>
</html>
