<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title | default "Static Bluesky Client" }}</title>
  <script type="importmap">
    {
      "imports": {
        "@material/web/": "https://esm.run/@material/web/"
      }
    }
  </script>
  <script type="module">
    import '@material/web/all.js';
    import {styles as typescaleStyles} from '@material/web/typography/md-typescale-styles.js';

    document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
  </script>
</head>
<body>
  <header style="padding:12px 16px; background:#f8f9fa; border-bottom:1px solid #e0e0e0;">
    <h1 style="margin:0; font-size:1.25rem;">🐦 Static Bluesky</h1>
  </header>

  <main style="max-width:640px; margin:0 auto; padding:0 16px;">
    {{ block "main" . }}{{ end }}
  </main>

  <footer style="padding:16px; text-align:center; color:#888; font-size:0.85rem; margin-top:32px;">
    <p>© 2026 {{ .Site.Title }} | Built with Hugo & MWC</p>
  </footer>
</body>
</html>
