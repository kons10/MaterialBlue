<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }}</title>
  <meta name="theme-color" content="#251f16">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" />

  <link rel="stylesheet" href="/static/src/styles.css">

  <script type="importmap">
    {
      "imports": {
        "@material/web/": "https://esm.sh/@material/web/",
        "@/": "/static/src/"
      }
    }
  </script>
  <script type="module">
    import '@material/web/all.js';
    import {styles as typescaleStyles} from '@material/web/typography/md-typescale-styles.js';
    document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
  </script>

</head>
<body class="sidebar-collapsed">
  <div class="app-shell">
    <aside class="sidebar" aria-label="サイドバー">
      <div class="brand">
        <md-icon>rss_feed</md-icon>
        <strong>Material Blue</strong>
      </div>
      <div class="sidebar-section-title">Navigation</div>
      <nav class="sidebar-nav" aria-label="ページ内ナビゲーション">
        <md-filled-tonal-button href="/login/" data-nav-item="login">
          <md-icon slot="icon" aria-hidden="true">login</md-icon>
          ログイン
        </md-filled-tonal-button>
        <md-filled-tonal-button href="/home/" data-nav-item="timeline">
          <md-icon slot="icon" aria-hidden="true">rss_feed</md-icon>
          主頁
        </md-filled-tonal-button>
      </nav>
      <div class="sidebar-actions">
        <md-outlined-button id="logoutBtn">
          <md-icon slot="icon">logout</md-icon>
          ログアウト
        </md-outlined-button>
      </div>
    </aside>

    <div class="content-area">
      <header>
        <div class="header-inner">
          <md-icon-button id="sidebarToggle" class="menu-btn" aria-label="メニュー切り替え">
            <md-icon>menu</md-icon>
          </md-icon-button>
          <md-icon>dynamic_feed</md-icon>
          <h1 class="md-typescale-headline-small" style="margin:0; font-weight:500;">Static Bluesky</h1>
          <md-icon-button id="themeToggle" aria-label="テーマ切り替え" style="margin-left:auto;">
            <md-icon id="themeIcon">dark_mode</md-icon>
          </md-icon-button>
        </div>
      </header>

      <main>
        {{ block "main" . }}{{ end }}
      </main>

      <footer>
        <p style="margin:0;" class="md-typescale-body-small">© 2026 Built with Hugo & MWC</p>
      </footer>
    </div>
  </div>

  <script type="module">
    import { initTheme, initSidebar } from '@/theme.js';
    
    initTheme();
    initSidebar();
  </script>
</body>
</html>
