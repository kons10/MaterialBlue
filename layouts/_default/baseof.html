<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }}</title>
  <meta name="theme-color" content="#251f16">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" />

  <script type="importmap">
    {
      "imports": {
        "@material/web/": "https://esm.sh/@material/web/"
      }
    }
  </script>
  <script type="module">
    import '@material/web/button/filled-button.js';
    import '@material/web/button/filled-tonal-button.js';
    import '@material/web/button/outlined-button.js';
    import '@material/web/card/elevated-card.js';
    import '@material/web/divider/divider.js';
    import '@material/web/icon/icon.js';
    import '@material/web/iconbutton/icon-button.js';
    import '@material/web/list/list.js';
    import '@material/web/list/list-item.js';
    import '@material/web/progress/circular-progress.js';
    import '@material/web/textfield/outlined-text-field.js';
    import {styles as typescaleStyles} from '@material/web/typography/md-typescale-styles.js';

    document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
  </script>

  <style>
    :root {
      --md-ref-typeface-brand: 'Google Sans', 'Roboto', system-ui;
      --md-ref-typeface-plain: 'Google Sans', 'Roboto', system-ui;
      --md-sys-color-primary: #6750A4;
      --md-sys-color-on-primary: #FFFFFF;
      --md-sys-color-primary-container: #E9DDFF;
      --md-sys-color-on-primary-container: #22005D;
      --md-sys-color-surface: #FCF8F8;
      --md-sys-color-on-surface: #1D1B20;
      --md-sys-color-surface-container: #F3EDF7;
      --md-sys-color-surface-container-high: #ECE6F0;
      --md-sys-color-surface-container-highest: #E6E0E9;
      --md-sys-color-outline: #CAC4D0;
      --catalog-shape-xl: 28px;
    }

    body { margin: 0; font-family: var(--md-ref-typeface-plain); background: var(--md-sys-color-surface-container); color: var(--md-sys-color-on-surface); }
    * { box-sizing: border-box; }

    .app-shell { min-height: 100vh; display: grid; grid-template-columns: 280px minmax(0, 1fr); }
    .sidebar {
      position: sticky;
      top: 0;
      align-self: start;
      height: 100vh;
      padding: 16px 12px;
      border-right: 1px solid var(--md-sys-color-outline);
      background: var(--md-sys-color-surface-container-high);
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease;
    }

    .brand { display: flex; align-items: center; gap: 10px; margin: 8px 8px 20px; }
    .sidebar-section-title { font-size: 1.25rem; margin: 8px; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 8px; }
    .sidebar-nav md-filled-tonal-button { width: 100%; justify-content: flex-start; --md-filled-tonal-button-container-shape: var(--catalog-shape-xl); }
    .sidebar-nav md-filled-tonal-button:hover, .sidebar-nav md-filled-tonal-button:focus-visible { --md-filled-tonal-button-container-color: var(--md-sys-color-surface-container-highest); }
    .sidebar-nav md-filled-tonal-button.active { --md-filled-tonal-button-container-color: var(--md-sys-color-primary-container); --md-filled-tonal-button-label-text-color: var(--md-sys-color-on-primary-container); font-weight: 500; }
    .sidebar-nav md-filled-tonal-button[aria-disabled="true"] { opacity: 0.5; pointer-events: none; }
    .favorite-icon,
    .save-icon {
      font-variation-settings: 'FILL' 0;
    }
    .favorite-icon.is-filled,
    .save-icon.is-filled {
      font-variation-settings: 'FILL' 1;
    }

    .sidebar-actions { margin-top: auto; padding: 12px 8px 0; border-top: 1px solid var(--md-sys-color-outline); }
    #logoutBtn { width: 100%; justify-content: center; }

    .content-area { display: flex; flex-direction: column; min-height: 100vh; }
    header { padding: 12px 16px; background: var(--md-sys-color-surface); border-bottom: 1px solid var(--md-sys-color-outline); position: sticky; top: 0; z-index: 30; }
    .header-inner { display:flex; align-items:center; gap:12px; }
    .menu-btn { display: none; }
    main { max-width: 760px; margin: 0 auto; padding: 16px; width: 100%; flex: 1; }
    footer { padding: 24px 16px; text-align: center; color: #666; font-size: 0.85rem; }

    @media (max-width: 900px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { position: fixed; left: 0; width: 280px; z-index: 20; border-right: 1px solid var(--md-sys-color-outline); }
      body.sidebar-collapsed .sidebar { transform: translateX(-100%); }
      body:not(.sidebar-collapsed)::before {
        content: '';
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.24);
        z-index: 15;
      }
      .menu-btn { display: inline-flex; }
    }
  </style>
</head>
<body class="sidebar-collapsed">
  <div class="app-shell">
    <aside class="sidebar" aria-label="サイドバー">
      <div class="brand">
        <md-icon>rss_feed</md-icon>
        <strong>Material Blue</strong>
      </div>
      <div class="sidebar-section-title">Navigation</div>
      <nav class="sidebar-nav" aria-label="ページ内ナビゲーション">
        <md-filled-tonal-button href="/login/" data-nav-item="login">
          <md-icon slot="icon" aria-hidden="true">login</md-icon>
          ログイン
        </md-filled-tonal-button>
        <md-filled-tonal-button href="/home/" data-nav-item="timeline">
          <md-icon slot="icon" aria-hidden="true">rss_feed</md-icon>
          主頁
        </md-filled-tonal-button>
      </nav>
      <div class="sidebar-actions">
        <md-outlined-button id="logoutBtn">
          <md-icon slot="icon">logout</md-icon>
          ログアウト
        </md-outlined-button>
      </div>
    </aside>

    <div class="content-area">
      <header>
        <div class="header-inner">
          <md-icon-button id="sidebarToggle" class="menu-btn" aria-label="メニュー切り替え">
            <md-icon>menu</md-icon>
          </md-icon-button>
          <md-icon>dynamic_feed</md-icon>
          <h1 class="md-typescale-headline-small" style="margin:0; font-weight:500;">Static Bluesky</h1>
        </div>
      </header>

      <main>
        {{ block "main" . }}{{ end }}
      </main>

      <footer>
        <p style="margin:0;" class="md-typescale-body-small">© 2026 Built with Hugo & MWC</p>
      </footer>
    </div>
  </div>

  <script>
    (() => {
      const btn = document.getElementById('sidebarToggle');
      if (!btn) return;
      btn.addEventListener('click', () => {
        document.body.classList.toggle('sidebar-collapsed');
      });
      document.querySelectorAll('.sidebar-nav md-filled-tonal-button').forEach((link) => {
        link.addEventListener('click', () => {
          document.querySelectorAll('.sidebar-nav md-filled-tonal-button').forEach((other) => other.classList.remove('active'));
          link.classList.add('active');
          if (window.matchMedia('(max-width: 900px)').matches) {
            document.body.classList.add('sidebar-collapsed');
          }
        });
      });
      if (!window.matchMedia('(max-width: 900px)').matches) {
        document.body.classList.remove('sidebar-collapsed');
      }

      document.addEventListener('click', (event) => {
        if (!window.matchMedia('(max-width: 900px)').matches) return;
        if (document.body.classList.contains('sidebar-collapsed')) return;

        const sidebar = document.querySelector('.sidebar');
        if (!sidebar) return;

        const clickedInsideSidebar = sidebar.contains(event.target);
        const clickedMenuButton = btn.contains(event.target);
        if (!clickedInsideSidebar && !clickedMenuButton) {
          document.body.classList.add('sidebar-collapsed');
        }
      });
    })();
  </script>
</body>
</html>
