# hugo.yaml
baseURL: 'https://bsky.zyn.f5.si/'  # ← 実際のURLに修正してね
locale: 'ja-JP'                 # ✅ languageCode → locale に変更（v0.158.0以降）
title: 'Static Bluesky Client'

# ❌ theme: ''  ← この行を完全に削除！存在しないテーマを探しに行かなくなる

publishDir: 'public'

# minify 設定（オプション）
minify:
  disableXML: true
  minifyOutput: true

# ✅ 重要：モジュール機能を明示的に無効化（テーマ探索を防ぐおまじない）
module:
  hugoVersion:
    extended: true
    min: '0.140.0'
  imports: []  # 空配列を指定して外部モジュール読み込みを無効化
